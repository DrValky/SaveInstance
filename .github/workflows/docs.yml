name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# One deploy at a time; let it finish (never cancel mid-deploy).
concurrency:
  group: docs-pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Moonwave
        run: npm install -g moonwave@latest
      - name: Build docs
        run: moonwave build --code . --out-dir build
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          force_orphan: true
